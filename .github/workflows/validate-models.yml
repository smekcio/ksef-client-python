name: Validate API Compliance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-models:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify generated models are up to date
        run: |
          python tools/generate_openapi_models.py --check --output src/ksef_client/openapi_models.py

      - name: Check API Coverage
        run: |
          python tools/check_coverage.py --src src/ksef_client/clients
